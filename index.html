<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Smart Fire Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>🔥 Smart Fire & Gas Dashboard</h1>
    
    <div class="grid">
        <div class="card" id="temp">Temperature: -- °C</div>
        <div class="card" id="humidity">Humidity: -- %</div>
        <div class="card" id="gas">Gas Value: --</div>
        <div class="card" id="fire">Fire: --</div>
        <div class="card" id="fan">Fan: --</div>
        <div class="card" id="pump">Pump: --</div>
    </div>
    
    <div class="chart-container">
        <canvas id="tempChart"></canvas>
    </div>
    
    <script type="module" src="app.js"></script>
</body>
</html>
